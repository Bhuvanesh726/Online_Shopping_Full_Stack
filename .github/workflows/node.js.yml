name: Frontend CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: Online_Shopping_Full_Stack
        run: npm install

      - name: Build
        working-directory: Online_Shopping_Full_Stack
        run: npm run build
