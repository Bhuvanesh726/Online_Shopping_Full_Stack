name: Frontend CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js (Vite requires 20+)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install dependencies (NO cd)
      - name: Install dependencies
        run: npm install

      # 4. Build project
      - name: Build
        run: npm run build

      # 5. Safe test step
      - name: Test
        run: echo "No tests configured"
