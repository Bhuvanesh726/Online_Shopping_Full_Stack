name: Full Stack CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # =========================
      # FRONTEND BUILD
      # =========================
      - name: Install frontend dependencies
        run: |
          if [ -d "frontend" ]; then
            cd frontend
            npm install
          fi

      - name: Build frontend
        run: |
          if [ -d "frontend" ]; then
            cd frontend
            npm run build --if-present
          fi

      # =========================
      # BACKEND BUILD
      # =========================
      - name: Install backend dependencies
        run: |
          if [ -d "backend" ]; then
            cd backend
            npm install
          else
            npm install
          fi

      # =========================
      # TESTS (SAFE)
      # =========================
      - name: Run tests
        run: |
          if npm run | grep -q "test"; then
            npm test
          else
            echo "No tests found, skipping..."
          fi
