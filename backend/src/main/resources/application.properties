# Server Configuration
server.port=8081

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/shopease_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=ShopEaseOnlineShoppingHubSecretKeyForJWTTokenGeneration2024VeryLongAndSecure
app.jwt.expiration=86400000

# Razorpay Configuration
razorpay.key.id=
razorpay.key.secret=

# Gemini AI Configuration
gemini.api.key=
gemini.api.url=

# Frontend URL
app.frontend.url=http://localhost:5174

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Upload Storage
app.upload.dir=uploads
app.upload.base-url=http://localhost:8081

# Mail Configuration 
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=shopeaseshoppingapp@gmail.com
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
