# Include secure properties from application-secret.properties
spring.profiles.include=secret

# Server Configuration
server.port=8081

# MySQL Configuration (Aiven Cloud)
spring.datasource.url=jdbc:mysql://online-shopping-app-bhuvanesh726.e.aivencloud.com:27068/defaultdb?sslMode=REQUIRED&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=avnadmin
# Spring Boot will read 'spring.datasource.password' from application-secret.properties (or system environment for Render)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.datasource.hikari.ssl-mode=required

# JWT Configuration
app.jwt.secret=ShopEaseOnlineShoppingHubSecretKeyForJWTTokenGeneration2024VeryLongAndSecure
app.jwt.expiration=86400000

# Razorpay Configuration
# Keys are managed securely via application-secret.properties locally, or OS environment variables in production.
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}

# Gemini AI Configuration
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent

# Frontend URL
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5174}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Upload Storage
app.upload.dir=uploads
app.upload.base-url=${APP_UPLOAD_BASE_URL:https://online-shopping-full-stack.onrender.com}

# Mail Configuration 
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=shopeaseshoppingapp@gmail.com
# spring.mail.password is provided via profile or environment
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
